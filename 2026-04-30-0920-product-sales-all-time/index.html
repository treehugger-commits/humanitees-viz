<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Sales — Mar 1 to Apr 28, 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #f0f0f0; padding: 24px 16px; }
  h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
  p.sub { font-size: 0.8rem; color: #888; margin-bottom: 24px; }
  .card { background: #1a1a1a; border-radius: 12px; padding: 20px; }
  canvas { max-height: 420px; }
</style>
</head>
<body>
<h1>Units Sold by Product</h1>
<p class="sub">All paid orders · Mar 1 – Apr 28, 2026 · 60 orders total</p>
<div class="card">
  <canvas id="chart"></canvas>
</div>
<script>
const labels = [
  "Wear It Forward",
  "Under Pressure",
  "Tree Frog",
  "The Living Forest",
  "They Were Here First",
  "Nature Can't Be Restocked",
  "Wild Earth",
  "Bear Us In Mind",
  "Eye On Survival",
  "Losing Ground"
];
const data = [32, 16, 12, 11, 10, 10, 8, 6, 6, 1];
const colors = data.map((_, i) => `hsl(${150 - i * 13}, 60%, ${55 - i * 2}%)`);

new Chart(document.getElementById("chart"), {
  type: "bar",
  data: {
    labels,
    datasets: [{
      label: "Units sold",
      data,
      backgroundColor: colors,
      borderRadius: 6,
      borderSkipped: false
    }]
  },
  options: {
    indexAxis: "y",
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ` ${ctx.parsed.x} units`
        }
      }
    },
    scales: {
      x: {
        grid: { color: "#2a2a2a" },
        ticks: { color: "#aaa", font: { size: 12 } }
      },
      y: {
        grid: { display: false },
        ticks: { color: "#ddd", font: { size: 12 } }
      }
    }
  }
});
</script>
</body>
</html>
